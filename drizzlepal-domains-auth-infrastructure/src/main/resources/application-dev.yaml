server:
  port: ${AUTH_SERVER_PORT:9990}

spring:
  datasource:
    auth:
      url: jdbc:mysql://${AUTH_SERVER_DB_HOST:localhost}:${AUTH_SERVER_DB_PORT:3306}/${AUTH_SERVER_DB_NAME:drizzlepal_servers_auth}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
      username: ${AUTH_SERVER_DB_USERNAME:root}
      password: ${AUTH_SERVER_DB_PASSWORD:KJGBKAHJSKDAHBS@$@Qadf@$!@wf(*&}
      driverClassName: ${AUTH_SERVER_DB_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
      configuration:
        poolName: HikariPool-Auth
        maxPoolSize: ${AUTH_SERVER_DB_MAX_POOL_SIZE:10}
        minIdle: ${AUTH_SERVER_DB_MIN_IDLE:10}
        idleTimeout: ${AUTH_SERVER_DB_IDLE_TIMEOUT:600000}
        maxLifetime: ${AUTH_SERVER_DB_MAX_LIFETIME:1800000}
        connectionTimeout: ${AUTH_SERVER_DB_CONNECTION_TIMEOUT:30000}
        validationTimeout: ${AUTH_SERVER_DB_VALIDATION_TIMEOUT:5000}
        leakDetectionThreshold: ${AUTH_SERVER_DB_LEAK_DETECTION_THRESHOLD:2}
        autoCommit: ${AUTH_SERVER_DB_AUTO_COMMIT:true}
        readOnly: ${AUTH_SERVER_DB_READ_ONLY:false}

springdoc:
  api-docs:
    enabled: ${AUTH_SERVER_API_DOCS_ENABLED:true}
    path: /v3/api-docs
  swagger-ui:
    enabled: ${AUTH_SERVER_SWAGGER_UI_ENABLED:true}
    path: /swagger-ui.html
    operationsSorter: alpha
    defaultModelsExpandDepth: 1
    defaultModelExpandDepth: 1
    displayRequestDuration: true
    tryItOutEnabled: true
